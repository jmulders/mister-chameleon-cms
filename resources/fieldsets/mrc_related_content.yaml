fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: source_mode
    field:
      type: select
      display: 'Content Source'
      default: manual
      options:
        manual: 'Manual — pick specific entries'
        automatic: 'Automatic — latest from collection'
  # ── Manual: pick entries ──────────────────────────────────────────────────────
  -
    handle: entries
    field:
      type: entries
      display: Entries
      instructions: 'Select entries to display. Drag rows to reorder.'
      mode: default
      if:
        source_mode: manual
  # ── Automatic: collection source ─────────────────────────────────────────────
  -
    handle: collection
    field:
      type: select
      display: Collection
      instructions: 'Pull the latest entries from this collection.'
      options:
        case_studies: Cases
        features: 'Features'
        testimonials: 'Testimonials'
        pages: "Pagina's"
      if:
        source_mode: automatic
  -
    handle: max_items
    field:
      type: integer
      display: 'Max Items'
      instructions: 'Maximum number of entries to show.'
      default: 3
      if:
        source_mode: automatic
