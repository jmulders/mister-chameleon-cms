fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: Variant
      default: testimonial_grid
      options:
        testimonial_grid: 'Grid'
        testimonial_single: 'Single (large)'
        testimonial_highlight: 'Highlight'
        testimonial_slider: 'Slider'
        testimonial_featured_image: 'Featured with image'
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: items
    field:
      type: replicator
      display: Testimonials
      button_label: 'Add testimonial'
      collapse: false
      sets:
        testimonial:
          display: Testimonial
          fields:
            -
              handle: quote
              field:
                type: textarea
                display: Quote
                rows: 3
            -
              handle: author
              field:
                type: text
                display: Name
            -
              handle: role
              field:
                type: text
                display: Role
            -
              handle: company
              field:
                type: text
                display: Company
            -
              handle: avatar
              field:
                type: assets
                display: Avatar
                max_files: 1
                instructions: 'Profile photo — shown in Featured Image and Slider variants.'
                restrict: false
  -
    handle: token_set
    field:
      type: text
      display: 'Token set'
      instructions: 'Optional. Key of a block token set from Design → Blocks (e.g. dark-section) to restyle just this block.'
