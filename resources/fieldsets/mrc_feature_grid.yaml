fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: Variant
      default: feature_grid_3up
      options:
        feature_grid_3up: '3-up grid'
        feature_grid_4up: '4-up grid'
        feature_grid_cards: Cards
        feature_grid_checklist: Checklist
        feature_grid_dark: Dark
        feature_grid_spacious: Spacious
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: items
    field:
      type: replicator
      display: 'Feature Items'
      button_label: 'Add feature'
      collapse: false
      sets:
        feature:
          display: Feature
          fields:
            -
              handle: icon
              field:
                type: text
                display: Icon
                instructions: 'Lucide icon name (e.g. zap, shield, users).'
            -
              handle: title
              field:
                type: text
                display: Title
            -
              handle: body
              field:
                type: textarea
                display: Description
                rows: 3
  -
    handle: cta
    field:
      type: group
      display: 'Call to Action'
      instructions: 'Optional button rendered below the feature grid.'
      fields:
        -
          handle: label
          field:
            type: text
            display: Label
        -
          handle: href
          field:
            type: text
            display: URL
        -
          handle: variant
          field:
            type: select
            display: Style
            default: primary
            options:
              primary: Primary
              secondary: Secondary
              outline: Outline
              link: Link
  -
    handle: token_set
    field:
      type: text
      display: 'Token set'
      instructions: 'Optional. Key of a block token set from Design → Blocks (e.g. dark-section) to restyle just this block.'
