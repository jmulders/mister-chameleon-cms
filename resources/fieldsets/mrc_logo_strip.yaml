fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: Variant
      default: default
      options:
        default: 'Default (scrolling strip)'
        muted: 'Muted (greyscale logos)'
        logo_grid: 'Grid (static grid layout)'
  -
    handle: heading
    field:
      type: text
      display: Heading
      instructions: 'Optional label above the logos, e.g. "Trusted by".'
  -
    handle: logos
    field:
      type: grid
      display: Logos
      add_row: 'Add logo'
      fields:
        -
          handle: name
          field:
            type: text
            display: Name
        -
          handle: image
          field:
            type: assets
            display: Logo Image
            max_files: 1
        -
          handle: url
          field:
            type: text
            display: Link URL
            instructions: 'Optional — makes the logo a clickable link.'
