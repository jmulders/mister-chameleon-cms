fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: 'Layout Variant'
      default: text_media_right
      options:
        text_media_right: 'Text left, media right'
        text_media_left: 'Media left, text right'
        text_media_stacked: 'Stacked (media above text)'
  -
    handle: eyebrow
    field:
      type: text
      display: Eyebrow
      instructions: 'Short label above the heading (e.g. "Case study").'
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: body
    field:
      type: textarea
      display: Body
  -
    handle: ctas
    field:
      type: grid
      display: CTAs
      add_row: 'Add CTA'
      fields:
        -
          handle: label
          field:
            type: text
            display: Label
        -
          handle: href
          field:
            type: link
            display: URL
            instructions: 'Kies een pagina uit de boom of typ een URL / anker (bijv. #contact of https://…).'
            collections:
              - pages
  -
    handle: media_type
    field:
      type: select
      display: 'Media Type'
      default: image
      options:
        image: Image
        video: Video
  # ── Image ────────────────────────────────────────────────────────────────────
  -
    handle: image
    field:
      type: assets
      display: Image
      max_files: 1
      if:
        media_type: image
  -
    handle: alt
    field:
      type: text
      display: 'Alt Text'
      if:
        media_type: image
  # ── Video source ─────────────────────────────────────────────────────────────
  -
    handle: video_source
    field:
      type: select
      display: 'Video Source'
      default: youtube
      options:
        youtube: 'YouTube'
        vimeo: 'Vimeo'
        upload: 'Upload (asset library)'
      if:
        media_type: video
  -
    handle: video_id
    field:
      type: text
      display: 'Video ID'
      instructions: 'YouTube ID (e.g. uER64JbBd7M) or Vimeo ID (e.g. 76979871). You can also paste the full watch URL.'
      if:
        media_type: video
        video_source: youtube
  -
    handle: vimeo_id
    field:
      type: text
      display: 'Vimeo ID'
      instructions: 'Vimeo video ID (e.g. 76979871) or the full vimeo.com URL.'
      if:
        media_type: video
        video_source: vimeo
  -
    handle: video_file
    field:
      type: assets
      display: 'Video File'
      max_files: 1
      instructions: 'Upload an mp4 or webm video file.'
      if:
        media_type: video
        video_source: upload
  # ── Video options ─────────────────────────────────────────────────────────────
  -
    handle: video_poster
    field:
      type: assets
      display: 'Poster / Placeholder Image'
      max_files: 1
      instructions: 'Shown before the video plays. Use the same aspect ratio as your video.'
      if:
        media_type: video
  -
    handle: video_autoplay
    field:
      type: toggle
      display: Autoplay
      instructions: 'Play automatically on page load. Audio is muted when autoplay is on.'
      default: false
      if:
        media_type: video
  -
    handle: video_loop
    field:
      type: toggle
      display: Loop
      instructions: 'Repeat the video continuously.'
      default: false
      if:
        media_type: video
  # ── Media background (images only) ────────────────────────────────────────────
  # Lets you place a pattern, colour, or decorative image behind the main media
  # asset.  Ideal for transparent PNGs that need depth or brand context.
  -
    handle: media_bg_type
    field:
      type: select
      display: 'Media Background'
      default: none
      instructions: 'Optional background shown behind the image. Use with transparent PNGs.'
      options:
        none: 'None (default)'
        color: 'Solid colour'
        image: 'Background image / pattern'
      if:
        media_type: image
  -
    handle: media_bg_color
    field:
      type: color
      display: 'Background Colour'
      instructions: 'Colour shown behind the main image.'
      if:
        media_bg_type: color
  -
    handle: media_bg_image
    field:
      type: assets
      display: 'Background Image'
      max_files: 1
      instructions: 'Pattern or texture image shown behind the main media asset.'
      if:
        media_bg_type: image
  # ── Shared ────────────────────────────────────────────────────────────────────
  -
    handle: caption
    field:
      type: text
      display: Caption
      instructions: 'Optional text shown below the media.'
  -
    handle: token_set
    field:
      type: text
      display: 'Token set'
      instructions: 'Optional. Key of a block token set from Design → Blocks (e.g. dark-section) to restyle just this block.'
