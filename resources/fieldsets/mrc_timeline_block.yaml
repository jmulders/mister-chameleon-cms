fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''our-history'' → /page#our-history. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: Variant
      default: timeline_vertical
      options:
        timeline_vertical:   'Vertical — dot markers with connecting line (default)'
        timeline_compact:    'Compact — tight single-column list, dates inline'
        timeline_milestones: 'Milestones — bold date cards in a grid (company history)'
        timeline_slider:     'Slider — full-width history slider with media + bottom nav bar'
  -
    handle: heading
    field:
      type: text
      display: Heading
      instructions: 'Section heading, e.g. "Our story" or "Key milestones".'
  -
    handle: description
    field:
      type: textarea
      display: Description
      instructions: 'Optional intro paragraph shown above the timeline entries.'
      rows: 3
  -
    handle: items
    field:
      type: replicator
      display: 'Timeline Items'
      instructions: 'Ordered list of milestones or events. Add in chronological order.'
      reorderable: true
      button_label: 'Add entry'
      sets:
        item:
          display: 'Timeline entry'
          fields:
            # ── Basic info ───────────────────────────────────────────────────
            -
              handle: date
              field:
                type: text
                display: 'Date / Year'
                instructions: 'Year or date label, e.g. "2023", "2024 Q1", "March 2025".'
                width: 33
            -
              handle: title
              field:
                type: text
                display: Title
                instructions: 'Milestone title, e.g. "Founded" or "Series A — €4.2M".'
                width: 67
            -
              handle: description
              field:
                type: textarea
                display: Description
                instructions: 'Optional supporting copy for this entry.'
                rows: 2

            # ── Media ────────────────────────────────────────────────────────
            -
              handle: media_type
              field:
                type: select
                display: 'Media type'
                instructions: 'Used by the Slider variant. Leave empty for text-only entries.'
                placeholder: '— none (text only) —'
                options:
                  image:      'Image'
                  video_file: 'Video file (upload / asset)'
                  youtube:    'YouTube'
                  vimeo:      'Vimeo'

            # Shown for: image only
            -
              handle: media_image
              field:
                type: assets
                display: Image
                instructions: 'Select or upload an image from the asset library.'
                max_files: 1
                if:
                  media_type: image

            # Shown for: video_file only
            -
              handle: media_asset
              field:
                type: assets
                display: 'Video file'
                instructions: 'Select or upload an mp4 / webm video file from the asset library.'
                max_files: 1
                if:
                  media_type: video_file

            # Shown for: YouTube only
            -
              handle: video_id
              field:
                type: text
                display: 'YouTube ID or URL'
                instructions: 'Bare 11-character ID, full YouTube URL, youtu.be link, or embed URL.'
                if:
                  media_type: youtube

            # Shown for: Vimeo only
            -
              handle: vimeo_id
              field:
                type: text
                display: 'Vimeo ID or URL'
                instructions: 'Numeric Vimeo ID or full vimeo.com URL.'
                if:
                  media_type: vimeo

            # ── Video options (video_file / YouTube / Vimeo — hidden for image) ──
            -
              handle: video_placeholder
              field:
                type: assets
                display: 'Poster / placeholder image'
                instructions: 'Frame shown before the video starts playing. (Video, YouTube, Vimeo only)'
                max_files: 1
                unless:
                  media_type: image
            -
              handle: video_autoplay
              field:
                type: toggle
                display: Autoplay
                instructions: 'Start playing automatically (always muted).'
                width: 50
                unless:
                  media_type: image
            -
              handle: video_loop
              field:
                type: toggle
                display: Loop
                instructions: 'Loop the video continuously.'
                width: 50
                unless:
                  media_type: image
  -
    handle: token_set
    field:
      type: text
      display: 'Token set'
      instructions: 'Optional. Key of a block token set from Design → Blocks (e.g. dark-section) to restyle just this block.'
