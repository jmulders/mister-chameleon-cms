fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: Variant
      default: listing_cards
      options:
        listing_cards: Cards
        listing_rows: Rows
        listing_compact: Compact
        listing_slider: 'Media Slider'
  -
    handle: heading
    field:
      type: text
      display: Heading
  # ── Media Slider items ─────────────────────────────────────────────────────
  # Only shown when variant = listing_slider.
  # Each item is either a static image or a hosted / uploaded video.
  -
    handle: media_items
    field:
      type: replicator
      display: 'Slider Items'
      instructions: 'Add images and/or videos to the slider. Drag rows to reorder.'
      collapse: true
      button_label: 'Add slide'
      if:
        variant: listing_slider
      sets:
        slide:
          display: Slide
          fields:
            -
              handle: media_type
              field:
                type: select
                display: 'Media Type'
                default: image
                options:
                  image: Image
                  video: Video
            # ── Image ──────────────────────────────────────────────────────
            -
              handle: image
              field:
                type: assets
                display: Image
                max_files: 1
                if:
                  media_type: image
            -
              handle: alt
              field:
                type: text
                display: 'Alt Text'
                if:
                  media_type: image
            # ── Video source ────────────────────────────────────────────────
            -
              handle: video_source
              field:
                type: select
                display: 'Video Source'
                default: youtube
                options:
                  youtube: YouTube
                  vimeo: Vimeo
                  upload: 'Upload (asset library)'
                if:
                  media_type: video
            -
              handle: video_id
              field:
                type: text
                display: 'YouTube Video ID'
                instructions: 'YouTube video ID (e.g. uER64JbBd7M) or the full watch URL.'
                if:
                  media_type: video
                  video_source: youtube
            -
              handle: vimeo_id
              field:
                type: text
                display: 'Vimeo Video ID'
                instructions: 'Vimeo video ID (e.g. 76979871) or the full vimeo.com URL.'
                if:
                  media_type: video
                  video_source: vimeo
            -
              handle: video_file
              field:
                type: assets
                display: 'Video File'
                max_files: 1
                instructions: 'Upload an mp4 or webm video file.'
                if:
                  media_type: video
                  video_source: upload
            # ── Video options ───────────────────────────────────────────────
            -
              handle: poster
              field:
                type: assets
                display: 'Poster / Placeholder Image'
                max_files: 1
                instructions: 'Shown before the video plays. Recommended: same aspect ratio as the video.'
                if:
                  media_type: video
            -
              handle: autoplay
              field:
                type: toggle
                display: Autoplay
                instructions: 'Play automatically when the slide is in view. Audio is muted when autoplay is on.'
                default: false
                if:
                  media_type: video
            # ── Shared ─────────────────────────────────────────────────────
            -
              handle: caption
              field:
                type: text
                display: Caption
                instructions: 'Optional label shown below the slide.'
  -
    handle: token_set
    field:
      type: text
      display: 'Token set'
      instructions: 'Optional. Key of a block token set from Design → Blocks (e.g. dark-section) to restyle just this block.'
