fields:
  -
    handle: key
    field:
      type: text
      display: Key
      instructions: 'Unique identifier (e.g. proof_default, proof_saas).'
      validate: required
  -
    handle: is_active
    field:
      type: toggle
      display: Active
      default: true
      instructions: 'Inactive variants are ignored by the personalisation engine.'
  -
    handle: title
    field:
      type: text
      display: 'Section Heading'
  -
    handle: items
    field:
      type: grid
      display: 'Proof Items'
      add_row: 'Add item'
      fields:
        -
          handle: title
          field:
            type: text
            display: Stat
            instructions: 'Short bold stat or heading, e.g. "3× higher conversion".'
        -
          handle: text
          field:
            type: textarea
            display: Description
