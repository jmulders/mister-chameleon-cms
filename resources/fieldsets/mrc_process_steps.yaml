fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: Variant
      default: horizontal
      options:
        default: 'Default (numbered list)'
        accordion: Accordion
        compact: Compact
        horizontal: Horizontal
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: steps
    field:
      type: replicator
      display: Steps
      button_label: 'Add step'
      collapse: false
      sets:
        step:
          display: Step
          fields:
            -
              handle: number
              field:
                type: text
                display: 'Step Number'
                instructions: 'Optional override — auto-numbered if left blank.'
            -
              handle: title
              field:
                type: text
                display: Title
            -
              handle: body
              field:
                type: textarea
                display: Description
                rows: 3
            -
              handle: duration
              field:
                type: text
                display: Duration
                instructions: 'Optional timeframe, e.g. "1–2 weeks" or "30 min".'
  -
    handle: token_set
    field:
      type: text
      display: 'Token set'
      instructions: 'Optional. Key of a block token set from Design → Blocks (e.g. dark-section) to restyle just this block.'
