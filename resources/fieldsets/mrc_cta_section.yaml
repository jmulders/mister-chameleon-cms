fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: Variant
      default: cta_banner
      options:
        cta_banner: 'Banner'
        cta_banner_default: 'Banner (default)'
        cta_banner_compact: 'Banner compact'
        cta_split: 'Split (two columns)'
        cta_card: 'Card'
        cta_soft: 'Soft (subtle background)'
        cta_glow: 'Glow'
        cta_newsletter: 'Newsletter (email input)'
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: body
    field:
      type: textarea
      display: Body
  -
    handle: primary_cta
    field:
      type: group
      display: 'Primary CTA'
      fields:
        -
          handle: label
          field:
            type: text
            display: Label
        -
          handle: href
          field:
            type: text
            display: URL
  -
    handle: secondary_cta
    field:
      type: group
      display: 'Secondary CTA'
      instructions: 'Optional second call-to-action button.'
      fields:
        -
          handle: label
          field:
            type: text
            display: Label
        -
          handle: href
          field:
            type: text
            display: URL
