fields:
  -
    handle: anchor_id
    field:
      type: text
      display: 'Anchor ID'
      instructions: 'Used for in-page navigation, e.g. ''contact'' → /page#contact. No spaces or special characters.'
  -
    handle: variant
    field:
      type: select
      display: Variant
      default: contact_default
      options:
        contact_default: 'Default'
        contact_split: 'Split (map + contact details)'
        contact_minimal: 'Minimal'
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: description
    field:
      type: textarea
      display: Description
  -
    handle: address
    field:
      type: text
      display: Address
  -
    handle: phone
    field:
      type: text
      display: Phone
  -
    handle: email
    field:
      type: text
      display: Email
  -
    handle: hours
    field:
      type: text
      display: 'Office Hours'
      instructions: 'e.g. "Mon–Fri 9:00–17:00"'
  -
    handle: map_url
    field:
      type: text
      display: 'Map Embed URL'
      instructions: 'Google Maps or similar embed URL.'
  -
    handle: ctas
    field:
      type: grid
      display: CTAs
      add_row: 'Add CTA'
      fields:
        -
          handle: label
          field:
            type: text
            display: Label
        -
          handle: href
          field:
            type: text
            display: URL
  -
    handle: token_set
    field:
      type: text
      display: 'Token set'
      instructions: 'Optional. Key of a block token set from Design → Blocks (e.g. dark-section) to restyle just this block.'
