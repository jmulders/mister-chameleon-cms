title: 'Main Navigation'
sections:
  mega_menu:
    display: 'Mega Menu'
    fields:
      -
        handle: dropdown_style
        field:
          type: select
          display: 'Dropdown style'
          instructions: 'How this item''s submenu renders (only relevant when it has sub-pages). Mega = wide feature columns + optional CTA. Simple = compact dropdown list.'
          options:
            mega: 'Mega menu — wide columns + CTA'
            simple: 'Simple — compact dropdown'
          default: mega
          width: 50
      -
        handle: mega_show_image
        field:
          type: toggle
          display: 'Show image'
          instructions: 'Shows the card thumbnail (overview image) of each sub-page in the mega menu. Only applies when this item has a mega menu.'
          default: true
          width: 50
      -
        handle: mega_show_description
        field:
          type: toggle
          display: 'Show description'
          instructions: 'Shows the excerpt / description of each sub-page in the mega menu. Only applies when this item has a mega menu.'
          default: true
          width: 50
      -
        handle: mega_cta_position
        field:
          type: select
          display: 'CTA block position'
          instructions: 'Shows a promotional CTA (image + heading + text + arrow) in the mega menu. Empty = no CTA.'
          options:
            left: 'Left — card beside the columns'
            right: 'Right — card beside the columns'
            bottom: 'Bottom — full-width bar'
          clearable: true
          placeholder: 'No CTA'
          width: 50
      -
        handle: mega_cta_heading
        field:
          type: text
          display: 'CTA — heading'
          instructions: 'Bold headline, e.g. "Need help choosing?".'
          width: 50
      -
        handle: mega_cta_text
        field:
          type: textarea
          display: 'CTA — text'
          instructions: 'Supporting text below the heading.'
          rows: 2
      -
        handle: mega_cta_image
        field:
          type: assets
          display: 'CTA — image'
          container: assets
          max_files: 1
          mode: grid
          width: 50
      -
        handle: mega_cta_url
        field:
          type: link
          display: 'CTA — link'
          instructions: 'Link to a page (entry) or enter an external URL.'
          collections:
            - pages
            - case_studies
            - blog
            - vacancies
          width: 50
      -
        handle: mega_cta_label
        field:
          type: text
          display: 'CTA — button label'
          instructions: 'Optional. Empty = arrow only.'
          width: 50
      -
        handle: mega_cta_new_tab
        field:
          type: toggle
          display: 'CTA — open in new tab'
          default: false
          width: 50
