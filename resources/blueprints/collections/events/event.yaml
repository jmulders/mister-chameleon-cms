title: Event
tabs:
  meta:
    display: Meta
    sections:
      - fields:
          - handle: title
            field:
              type: text
              display: Event title
              validate: required
          - handle: meta_keywords
            field:
              type: tags
              display: 'Interest Keywords'
              instructions: "Keywords describing the primary topics of this event. Used by the platform's interest-profile scoring engine to infer visitor interests from browsing history. First-party behavioural signals only — NOT SEO meta keywords."
          - handle: start_date
            field:
              type: date
              display: Start date
              instructions: When the event starts. Also used on the content calendar.
              time_enabled: true
              time_seconds_enabled: false
          - handle: end_date
            field:
              type: date
              display: End date
              instructions: When the event ends. Past events are hidden from listings automatically.
              time_enabled: true
              time_seconds_enabled: false
          - handle: location
            field:
              type: text
              display: Location
          - handle: seo_description
            field:
              type: textarea
              display: SEO description
              instructions: Meta description shown in search results (max 160 chars).
  card:
    display: Card
    sections:
      - fields:
          - import: mrc_card_fields
  content:
    display: Content
    sections:
      - fields:
          - handle: page_blocks
            field:
              type: replicator
              display: 'Content blocks'
              collapse: true
              button_label: Add block
              sets:
                text_and_media:
                  display: Text & Media
                  sets:
                    text_section:
                      display: Text section
                      fields:
                        - import: mrc_text_section
                    rich_text:
                      display: Rich text
                      fields:
                        - import: mrc_rich_text
                    image:
                      display: Text + Media
                      fields:
                        - import: mrc_image_block
                    video:
                      display: Video
                      fields:
                        - import: mrc_video_block
                    quote_block:
                      display: Quote
                      fields:
                        - import: mrc_quote_block
                conversion_and_forms:
                  display: 'Conversion & Forms'
                  sets:
                    cta_section:
                      display: 'CTA section'
                      fields:
                        - import: mrc_cta_section
                    form_section:
                      display: 'Form section'
                      fields:
                        - import: mrc_form_section
