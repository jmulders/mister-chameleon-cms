title: Page
tabs:
  meta:
    display: Meta
    sections:
      - fields:
          - handle: title
            field:
              type: text
              display: Title
              validate: required
          - handle: meta_keywords
            field:
              type: tags
              display: 'Interest Keywords'
              instructions: "Keywords describing the primary topics of this page. Used by the platform's interest-profile scoring engine to infer visitor interests from browsing history (e.g. 'logistics', 'warehousing', 'automation'). First-party behavioural signals only — NOT rendered as SEO meta keywords."
          - handle: template
            field:
              type: select
              display: Template
              instructions: Determines the page layout in Next.js.
              options:
                home: Home (marketing + personalisation)
                marketing_page: Marketing Page
                landing_page: Landing Page
                article_page: Article Page
                listing_page: Listing Page
                detail_page: Detail Page
              default: marketing_page
  card:
    display: Card
    sections:
      - fields:
          - import: mrc_card_fields
  content:
    display: Page Content
    sections:
      - instructions: Build the page by placing content around the fixed Context Slots. Context Slots are anchor points for personalised blocks — editors can only change the default variant key and toggle them on/off. Add, reorder, toggle, and delete content blocks freely.
        fields:
          - import: mc_page_blocks
  seo:
    display: SEO
    sections:
      - fields:
          - handle: seo_title
            field:
              type: text
              display: 'SEO title'
              instructions: 'Page title shown in search results. Leave empty to use the entry title.'
          - handle: seo_description
            field:
              type: textarea
              display: 'SEO description'
              instructions: 'Meta description shown in search results (max 160 chars).'
          - handle: robots_noindex
            field:
              type: toggle
              display: 'No-index'
              default: false
              instructions: 'Prevent search engines from indexing this page.'
          - handle: robots_nofollow
            field:
              type: toggle
              display: 'No-follow'
              default: false
              instructions: 'Prevent search engines from following links on this page.'
          - handle: canonical_url
            field:
              type: text
              display: 'Canonical URL'
              instructions: 'Override the default canonical URL. Leave empty to use the page URL.'
          - handle: og_title
            field:
              type: text
              display: 'Social title'
              instructions: 'Title shown when shared on social media. Falls back to SEO title or entry title.'
          - handle: og_description
            field:
              type: textarea
              display: 'Social description'
              instructions: 'Description shown when shared on social media. Falls back to SEO description.'
          - handle: og_image
            field:
              type: assets
              display: 'Social image'
              max_files: 1
              instructions: 'Image shown when shared on social media. Recommended: 1200x630px.'
