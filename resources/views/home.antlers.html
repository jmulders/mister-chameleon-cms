<div class="mx-auto max-w-5xl px-6 py-12">
    <div class="mb-10 flex items-center gap-2 border-b border-slate-100 pb-4 text-xs font-medium uppercase tracking-wide text-slate-400">
        <span class="inline-block h-2 w-2 rounded-full bg-emerald-500"></span>
        Live preview &middot; {{ title }} &middot; {{ page_blocks | length }} blokken
    </div>
    <div class="space-y-4">
        {{ page_blocks }}
            <div class="rounded-lg border border-slate-300 p-4">
                <div class="text-xs font-semibold uppercase text-indigo-500">{{ type }}</div>
                {{ if heading }}<div class="font-bold text-slate-900">{{ heading }}</div>{{ /if }}
                {{ if body }}<div class="text-sm text-slate-600">{{ body }}</div>{{ /if }}
            </div>
        {{ /page_blocks }}
    </div>
</div>
